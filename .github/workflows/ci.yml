name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.8.4"
          args: check .

  test:
    name: Tests (Backend + Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment
        run: cp .env.example .env
      - name: Backend tests
        run: docker compose run --rm -w /app/backend backend pytest
      - name: Worker tests
        run: docker compose run --rm --no-deps -w /app/worker worker pytest
