name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.8.4"
          args: check .
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.8.4"
          args: format --check .

  test:
    name: Backend + Worker (pytest, migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment
        run: cp .env.example .env
      - name: Migration drift check (upgrade head, then alembic check)
        run: docker compose run --rm backend sh -c "alembic upgrade head && alembic check"
      - name: Backend tests
        run: docker compose run --rm -w /app/backend backend pytest
      - name: Worker tests
        run: docker compose run --rm --no-deps -w /app/worker worker pytest

  frontend:
    name: Frontend (typecheck, build, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck + build
        run: npm run build
      - name: Unit tests (vitest)
        run: npm test
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install uv pip-audit
          uv pip install --system -e packages/dms_core -e "backend[dev]"
      - name: Audit installed dependencies
        run: pip-audit
