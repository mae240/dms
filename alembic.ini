# Alembic-Konfiguration. Die DB-URL wird in env.py aus den Settings (.env)
# gelesen — hier bewusst NICHT gesetzt, um keine Credentials zu committen.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
